name: Fullstack CI (Next.js + Express-ready)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint --if-present

      - name: Build frontend
        run: pnpm build

      - name: Test frontend
        run: pnpm test --if-present






      - name: Install server deps
        if: hashFiles('server/package.json') != ''
        run: |
          cd server
          pnpm install

      - name: Lint server
        if: hashFiles('server/package.json') != ''
        run: |
          cd server
          pnpm lint --if-present

      - name: Test server
        if: hashFiles('server/package.json') != ''
        run: |
          cd server
          pnpm test --if-present